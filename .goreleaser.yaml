version: 2

project_name: ics-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: icsmcp
    main: ./main.go
    binary: icsmcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/jeeftor/icsmcp/cmd/icsmcp.Version={{ .Version }}
      - -X github.com/jeeftor/icsmcp/cmd/icsmcp.Commit={{ .Commit }}
      - -X github.com/jeeftor/icsmcp/cmd/icsmcp.Date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - icsmcp
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
