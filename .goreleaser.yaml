version: 2

project_name: ics-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: icsmcp
    main: ./main.go
    binary: icsmcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - icsmcp
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  - id: icsmcp-amd64
    ids:
      - icsmcp
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: amd64
    image_templates:
      - ghcr.io/jeeftor/ics-mcp:{{ .Version }}-amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description=ICS Calendar MCP server
      - --label=org.opencontainers.image.url=https://github.com/jeeftor/ics-mcp
      - --label=org.opencontainers.image.source=https://github.com/jeeftor/ics-mcp
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
  - id: icsmcp-arm64
    ids:
      - icsmcp
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: arm64
    image_templates:
      - ghcr.io/jeeftor/ics-mcp:{{ .Version }}-arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description=ICS Calendar MCP server
      - --label=org.opencontainers.image.url=https://github.com/jeeftor/ics-mcp
      - --label=org.opencontainers.image.source=https://github.com/jeeftor/ics-mcp
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}

docker_manifests:
  - name_template: ghcr.io/jeeftor/ics-mcp:{{ .Version }}
    image_templates:
      - ghcr.io/jeeftor/ics-mcp:{{ .Version }}-amd64
      - ghcr.io/jeeftor/ics-mcp:{{ .Version }}-arm64
  - name_template: ghcr.io/jeeftor/ics-mcp:latest
    image_templates:
      - ghcr.io/jeeftor/ics-mcp:{{ .Version }}-amd64
      - ghcr.io/jeeftor/ics-mcp:{{ .Version }}-arm64

