name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  goreleaser:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.3
        with:
          distribution: goreleaser
          version: v2.16.0
          args: ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-notes:
    if: startsWith(github.ref, 'refs/tags/')
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Build release notes from changelog
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes="dist/release-notes.md"
          section="dist/changelog-section.md"
          mkdir -p dist
          awk -v tag="${tag}" '
            $0 == "## " tag || index($0, "## " tag " - ") == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > "${section}"
          if [ -s "${section}" ]; then
            {
              echo "## ${tag}"
              cat "${section}"
            } > "${notes}"
          else
            {
              echo "## ${tag}"
              echo
              echo "See CHANGELOG.md for release details."
            } > "${notes}"
          fi
          {
            echo
            echo "### Artifacts"
            echo "- Docker images: \`ghcr.io/jeeftor/ics-mcp:${version}\` and \`ghcr.io/jeeftor/ics-mcp:latest\`"
            echo "- Multi-arch Docker platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo "- Release archives are attached for Linux, macOS, and Windows on amd64/arm64."
          } >> "${notes}"

      - name: Update GitHub release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --notes-file dist/release-notes.md
