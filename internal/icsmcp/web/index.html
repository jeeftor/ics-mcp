<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICS MCP Admin</title>
  <style>
    body { margin: 0; font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1d252c; background: #f6f7f8; }
    header { padding: 20px 28px; background: #27343d; color: white; }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
    .endpoints { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #dce6eb; }
    .endpoints code { color: #ffffff; }
    main { max-width: 1120px; margin: 0 auto; padding: 24px; }
    section { margin-top: 28px; }
    h2 { margin: 0 0 12px; font-size: 17px; letter-spacing: 0; }
    form { display: grid; grid-template-columns: minmax(160px, 240px) minmax(260px, 1fr) auto; gap: 10px; margin-bottom: 22px; }
    input, select, textarea { padding: 10px 12px; border: 1px solid #b8c0c7; border-radius: 6px; background: white; font: inherit; }
    textarea { width: 100%; min-height: 160px; resize: vertical; box-sizing: border-box; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    button { padding: 9px 12px; border: 1px solid #60717c; border-radius: 6px; background: #ffffff; color: #1d252c; font: inherit; cursor: pointer; }
    button.primary { background: #28666e; color: white; border-color: #28666e; }
    button.danger { border-color: #b55454; color: #8d2525; }
    table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #d8dde1; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e2e6e9; text-align: left; vertical-align: top; }
    th { background: #eef1f3; font-weight: 650; }
    td.actions { white-space: nowrap; }
    .muted { color: #687782; }
    .error { color: #9c2f2f; max-width: 360px; overflow-wrap: anywhere; }
    .tool-runner { display: grid; grid-template-columns: minmax(220px, 320px) minmax(0, 1fr); gap: 16px; align-items: start; }
    .tool-list { display: grid; gap: 8px; }
    .tool-button { text-align: left; background: #fff; }
    .tool-button.active { border-color: #28666e; box-shadow: inset 3px 0 0 #28666e; }
    .tool-output { margin: 12px 0 0; padding: 12px; min-height: 160px; overflow: auto; background: #101820; color: #e6edf3; border-radius: 6px; font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .json-key { color: #7dd3fc; }
    .json-string { color: #86efac; }
    .json-number { color: #fbbf24; }
    .json-boolean { color: #f0abfc; }
    .json-null { color: #cbd5e1; }
    .tool-controls { display: flex; gap: 8px; align-items: center; margin: 10px 0; }
    @media (max-width: 760px) {
      main { padding: 14px; }
      form { grid-template-columns: 1fr; }
      .tool-runner { grid-template-columns: 1fr; }
      table, thead, tbody, tr, th, td { display: block; }
      thead { display: none; }
      tr { border-bottom: 1px solid #d8dde1; }
      td { border: 0; }
      td::before { content: attr(data-label); display: block; font-size: 12px; color: #687782; margin-bottom: 4px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>ICS MCP Debug</h1>
    <div class="endpoints">
      <span>Admin UI <code id="admin-url">/</code></span>
      <span>MCP Server <code id="mcp-url">/mcp</code></span>
      <span>Status API <code id="status-url">/api/status</code></span>
    </div>
  </header>
  <main>
    <form id="add-form">
      <input id="name" name="name" placeholder="Calendar name" required>
      <input id="url" name="url" placeholder="ICS URL" required>
      <button class="primary" type="submit">Add Calendar</button>
    </form>
    <section>
      <h2>Calendars</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Enabled</th>
            <th>Refresh</th>
            <th>Events</th>
            <th>Error</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="calendars"></tbody>
      </table>
    </section>

    <section>
      <h2>Next Meetings By Calendar</h2>
      <table>
        <thead>
          <tr>
            <th>Calendar</th>
            <th>When</th>
            <th>Meeting</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody id="meetings"></tbody>
      </table>
    </section>

    <section>
      <h2>Tool Preview</h2>
      <div class="tool-runner">
        <div id="tools" class="tool-list"></div>
        <div>
          <textarea id="tool-args" spellcheck="false">{}</textarea>
          <div class="tool-controls">
            <button id="run-tool" class="primary" type="button">Run Tool</button>
            <span id="tool-status" class="muted"></span>
          </div>
          <pre id="tool-output" class="tool-output">{}</pre>
        </div>
      </div>
    </section>
  </main>
  <script>
    const tbody = document.querySelector('#calendars');
    const meetingsBody = document.querySelector('#meetings');
    const toolsEl = document.querySelector('#tools');
    const toolArgs = document.querySelector('#tool-args');
    const toolOutput = document.querySelector('#tool-output');
    const toolStatus = document.querySelector('#tool-status');
    const runTool = document.querySelector('#run-tool');
    const form = document.querySelector('#add-form');
    let selectedTool = null;
    let tools = [];

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      if (!response.ok) throw new Error(await response.text());
      return response.status === 204 ? null : response.json();
    }

    function fmt(value) {
      return value ? new Date(value).toLocaleString() : 'Never';
    }

    async function load() {
      renderEndpoints();
      const calendars = await api('/api/calendars');
      tbody.replaceChildren(...calendars.map((calendar) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td data-label="Name"><input value="${escapeHTML(calendar.name)}" data-field="name"></td>
          <td data-label="Enabled">${calendar.enabled ? 'Yes' : 'No'}</td>
          <td data-label="Refresh"><span class="muted">Last:</span> ${fmt(calendar.last_success)}<br><span class="muted">Next:</span> ${fmt(calendar.next_refresh)}</td>
          <td data-label="Events">${calendar.event_count}</td>
          <td data-label="Error" class="error">${escapeHTML(calendar.last_error || '')}</td>
          <td data-label="Actions" class="actions">
            <button data-action="save">Save</button>
            <button data-action="refresh">Refresh</button>
            <button class="danger" data-action="delete">Remove</button>
          </td>`;
        row.querySelector('[data-action="save"]').addEventListener('click', async () => {
          await api('/api/calendars/' + calendar.id, {
            method: 'PATCH',
            body: JSON.stringify({ name: row.querySelector('[data-field="name"]').value })
          });
          await load();
        });
        row.querySelector('[data-action="refresh"]').addEventListener('click', async () => {
          await api('/api/calendars/' + calendar.id + '/refresh', { method: 'POST' });
          await load();
        });
        row.querySelector('[data-action="delete"]').addEventListener('click', async () => {
          await api('/api/calendars/' + calendar.id, { method: 'DELETE' });
          await load();
        });
        return row;
      }));
      await loadMeetings();
      await loadTools();
    }

    async function loadMeetings() {
      const groups = await api('/api/meetings/by-calendar?limit=10');
      if (groups.length === 0) {
        meetingsBody.innerHTML = '<tr><td colspan="4" class="muted">No upcoming meetings in the cache.</td></tr>';
        return;
      }
      const rows = [];
      for (const group of groups) {
        for (const [index, meeting] of group.meetings.entries()) {
          const row = document.createElement('tr');
          const marker = meeting.ongoing ? 'Now' : `${escapeHTML(meeting.day)} ${escapeHTML(meeting.start)}`;
          row.innerHTML = `
          <td data-label="Calendar">${index === 0 ? escapeHTML(group.calendar_name) : ''}</td>
          <td data-label="When">${marker}<br><span class="muted">${escapeHTML(meeting.date)} ${escapeHTML(meeting.start)}-${escapeHTML(meeting.end)}</span></td>
          <td data-label="Meeting">${escapeHTML(meeting.name)}</td>
          <td data-label="Duration">${meeting.duration_minutes} min</td>`;
          rows.push(row);
        }
      }
      meetingsBody.replaceChildren(...rows);
    }

    function renderEndpoints() {
      document.querySelector('#admin-url').textContent = window.location.origin + '/';
      document.querySelector('#mcp-url').textContent = window.location.origin + '/mcp';
      document.querySelector('#status-url').textContent = window.location.origin + '/api/status';
    }

    async function loadTools() {
      if (tools.length === 0) {
        tools = await api('/api/tools');
        selectedTool = tools[0];
        toolArgs.value = JSON.stringify(selectedTool.default_arguments || {}, null, 2);
        renderTools();
      }
    }

    function renderTools() {
      toolsEl.replaceChildren(...tools.map((tool) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'tool-button' + (selectedTool && selectedTool.name === tool.name ? ' active' : '');
        button.innerHTML = `${escapeHTML(tool.name)}<br><span class="muted">${escapeHTML(tool.description)}</span>`;
        button.addEventListener('click', () => {
          selectedTool = tool;
          toolArgs.value = JSON.stringify(tool.default_arguments || {}, null, 2);
          toolOutput.textContent = '{}';
          toolStatus.textContent = '';
          renderTools();
        });
        return button;
      }));
      if (selectedTool && toolArgs.value.trim() === '') {
        toolArgs.value = JSON.stringify(selectedTool.default_arguments || {}, null, 2);
      }
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      await api('/api/calendars', {
        method: 'POST',
        body: JSON.stringify({ name: form.name.value, url: form.url.value })
      });
      form.reset();
      await load();
    });

    runTool.addEventListener('click', async () => {
      if (!selectedTool) return;
      let parsedArgs;
      try {
        parsedArgs = JSON.parse(toolArgs.value || '{}');
      } catch (error) {
        toolStatus.textContent = 'Invalid JSON';
        toolOutput.textContent = error.message;
        return;
      }
      toolStatus.textContent = 'Running...';
      try {
        const result = await api('/api/tools/' + selectedTool.name + '/call', {
          method: 'POST',
          body: JSON.stringify({ arguments: parsedArgs })
        });
        renderJSON(toolOutput, result);
        toolStatus.textContent = 'Complete';
        await loadMeetings();
      } catch (error) {
        toolOutput.textContent = error.message;
        toolStatus.textContent = 'Error';
      }
    });

    function renderJSON(target, value) {
      const json = JSON.stringify(value, null, 2);
      target.innerHTML = syntaxHighlightJSON(json);
    }

    function syntaxHighlightJSON(json) {
      return escapeHTML(json).replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\btrue\b|\bfalse\b|\bnull\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
        if (match.startsWith('"')) {
          return match.endsWith(':')
            ? `<span class="json-key">${match}</span>`
            : `<span class="json-string">${match}</span>`;
        }
        if (match === 'true' || match === 'false') return `<span class="json-boolean">${match}</span>`;
        if (match === 'null') return `<span class="json-null">${match}</span>`;
        return `<span class="json-number">${match}</span>`;
      });
    }

    load().catch((error) => {
      tbody.innerHTML = `<tr><td colspan="6" class="error">${escapeHTML(error.message)}</td></tr>`;
    });
  </script>
</body>
</html>
